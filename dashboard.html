<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#444444">
    <title>Daily Dive — Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600&display=swap"
        rel="stylesheet">

    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
        }

        :root {
            --background: #f7f8fc;
            --text-color: #333;
            --accent-color: #007aff;
            --shadow-color: rgba(0, 0, 0, 0.08);
            --dot-color: #d7d7d7;
            --card-radius: 12px;
            --section-gap: 40px;
        }

        body {
            font-family: 'Bricolage Grotesque', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--background);
            background-image: radial-gradient(circle, var(--dot-color) 1px, transparent 1px);
            background-size: 25px 25px;
            margin: 0;
            padding: 0;
            color: var(--text-color);
        }

        ::-webkit-scrollbar {
            display: none;
        }

        body {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .app-container {
            max-width: 1200px;
            margin: auto;
            padding: 20px 25px 60px;
        }

        /* --- HEADER --- */
        header {
            display: flex;
            flex-direction: column;
            align-items: stretch;
            padding: 14px 0 0;
            margin-bottom: 30px;
        }

        .header-top-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            margin-bottom: 15px;
            gap: 10px;
        }

        header h1 {
            font-size: 22px;
            font-weight: 600;
            margin: 0;
        }

        .header-meta {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }

        .last-synced {
            font-size: 12px;
            color: rgba(0, 0, 0, 0.4);
        }

        .refresh-btn {
            background: none;
            border: 1px solid #ddd;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.3s ease, background-color 0.2s;
            color: #555;
        }

        .refresh-btn:hover {
            background-color: #eee;
        }

        .refresh-btn.spinning svg {
            animation: spin 0.8s ease-in-out;
        }

        @keyframes spin {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        /* --- FILTER BAR --- */
        .filter-bar-container {
            width: 100%;
            overflow-x: auto;
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .filter-bar-container::-webkit-scrollbar {
            display: none;
        }

        .filter-bar {
            display: flex;
            gap: 10px;
            padding-bottom: 5px;
        }

        .filter-chip {
            padding: 6px 14px;
            border-radius: 18px;
            background-color: #e9e9f0;
            color: #555;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            white-space: nowrap;
            flex-shrink: 0;
            border: 1px solid transparent;
        }

        .filter-chip:hover {
            background-color: #dcdce5;
        }

        .filter-chip.active {
            background-color: var(--accent-color);
            color: white;
            box-shadow: 0 2px 8px rgba(0, 122, 255, 0.3);
        }

        /* --- STATS BAR --- */
        .stats-bar {
            display: flex;
            gap: 15px;
            margin-bottom: var(--section-gap);
            flex-wrap: wrap;
        }

        .stat-card {
            flex: 1;
            min-width: 140px;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border-radius: var(--card-radius);
            padding: 20px;
            box-shadow: 0 2px 10px var(--shadow-color);
            border: 1px solid rgba(255, 255, 255, 0.9);
            text-align: center;
            transition: transform 0.2s ease;
        }

        .stat-card:hover {
            transform: translateY(-2px);
        }

        .stat-value {
            font-size: 36px;
            font-weight: 600;
            line-height: 1;
            margin-bottom: 6px;
        }

        .stat-value.active-color {
            color: var(--accent-color);
        }

        .stat-value.completed-color {
            color: #28a745;
        }

        .stat-value.rate-color {
            background: linear-gradient(135deg, var(--accent-color), #28a745);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stat-label {
            font-size: 13px;
            color: rgba(0, 0, 0, 0.5);
            font-weight: 500;
        }

        /* --- SECTIONS --- */
        .section {
            margin-bottom: var(--section-gap);
        }

        .section-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 18px;
        }

        .section-header h2 {
            margin: 0;
            font-size: 18px;
            font-weight: 600;
        }

        .section-count {
            background-color: #e9e9f0;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 13px;
            color: #555;
            font-weight: 500;
        }

        /* --- TASK GRID --- */
        .task-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        /* --- TASK CARD --- */
        .task-card {
            height: 180px;
            border-radius: var(--card-radius);
            box-shadow: 0 4px 12px var(--shadow-color);
            border: 1px solid #ffffff;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1), box-shadow 0.2s ease;
            position: relative;
        }

        .task-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px var(--shadow-color);
        }

        .task-card-body {
            padding: 18px 20px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .task-card-title {
            font-size: 17px;
            font-weight: 600;
            line-height: 1.4;
            margin-bottom: 8px;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .task-card-meta {
            margin-top: auto;
            font-size: 12px;
            color: rgba(0, 0, 0, 0.45);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .task-card.completed .task-card-title {
            text-decoration: line-through;
            color: rgba(0, 0, 0, 0.5);
        }

        .task-card.completed {
            opacity: 0.75;
        }

        .task-card.hibernated {
            opacity: 0.65;
        }

        .hibernated-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            font-size: 16px;
            opacity: 0.7;
        }

        .active-days-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.08);
            padding: 3px 8px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 600;
            color: rgba(0, 0, 0, 0.5);
        }

        /* --- TASK TAGS --- */
        .task-card-tags {
            padding: 0 10px 10px;
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
        }

        .task-tag {
            background-color: rgba(0, 0, 0, 0.07);
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 11px;
            color: rgba(0, 0, 0, 0.6);
        }

        /* --- LOADING & EMPTY STATES --- */
        .loading-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 20px;
            gap: 15px;
        }

        .loader-spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--accent-color);
            border-radius: 50%;
            width: 36px;
            height: 36px;
            animation: spin 1s linear infinite;
        }

        .loading-text {
            font-size: 14px;
            color: rgba(0, 0, 0, 0.4);
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: rgba(0, 0, 0, 0.35);
            font-size: 15px;
        }

        .empty-state .empty-emoji {
            font-size: 40px;
            margin-bottom: 10px;
        }

        .error-state {
            background: #fff0f0;
            border: 1px solid #ffd0d0;
            border-radius: var(--card-radius);
            padding: 20px;
            text-align: center;
            color: #c00;
            font-size: 14px;
        }

        /* --- ANIMATIONS --- */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-in {
            animation: fadeInUp 0.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
            opacity: 0;
        }

        /* --- RESPONSIVE --- */
        @media (max-width: 600px) {
            .app-container {
                padding: 15px 15px 40px;
            }

            header h1 {
                font-size: 18px;
            }

            .stats-bar {
                gap: 10px;
            }

            .stat-card {
                min-width: 90px;
                padding: 14px 10px;
            }

            .stat-value {
                font-size: 28px;
            }

            .task-grid {
                grid-template-columns: 1fr;
                gap: 15px;
            }

            .task-card {
                height: 160px;
            }
        }
    </style>
</head>

<body>
    <div class="app-container">
        <header>
            <div class="header-top-row">
                <h1>📋 Daily Dive Dashboard</h1>
                <div class="header-meta">
                    <span id="last-synced" class="last-synced"></span>
                    <button id="refresh-btn" class="refresh-btn" title="Refresh Data">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="23 4 23 10 17 10"></polyline>
                            <polyline points="1 20 1 14 7 14"></polyline>
                            <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15">
                            </path>
                        </svg>
                    </button>
                </div>
            </div>
            <div class="filter-bar-container">
                <div id="filter-bar" class="filter-bar"></div>
            </div>
        </header>

        <!-- Stats Bar -->
        <div id="stats-bar" class="stats-bar" style="display: none;">
            <div class="stat-card animate-in">
                <div id="stat-active" class="stat-value active-color">0</div>
                <div class="stat-label">Active Tasks</div>
            </div>
            <div class="stat-card animate-in" style="animation-delay: 0.05s;">
                <div id="stat-completed" class="stat-value completed-color">0</div>
                <div class="stat-label">Completed</div>
            </div>
            <div class="stat-card animate-in" style="animation-delay: 0.1s;">
                <div id="stat-rate" class="stat-value rate-color">0%</div>
                <div class="stat-label">Completion Rate</div>
            </div>
        </div>

        <!-- Active Tasks Section -->
        <div id="active-section" class="section" style="display: none;">
            <div class="section-header">
                <h2>🔵 Active</h2>
                <span id="active-count" class="section-count">0</span>
            </div>
            <div id="active-grid" class="task-grid"></div>
        </div>

        <!-- Completed Tasks Section -->
        <div id="completed-section" class="section" style="display: none;">
            <div class="section-header">
                <h2>✅ Finished</h2>
                <span id="completed-count" class="section-count">0</span>
            </div>
            <div id="completed-grid" class="task-grid"></div>
        </div>

        <!-- Loading State -->
        <div id="loading-state" class="loading-container">
            <div class="loader-spinner"></div>
            <div class="loading-text">Loading dashboard data...</div>
        </div>

        <!-- Error State -->
        <div id="error-state" class="error-state" style="display: none;"></div>
    </div>

    <script>
        (function () {
            // --- CONFIG ---
            // This reads directly from the MAIN spreadsheet (must be set to "Anyone with the link → Viewer")
            const SPREADSHEET_ID = '1J9xENB3Fz3laJlMsz5mdojXu0BbJ3oCNE5LxHRaI128';
            const SHEET_NAME = 'tasks';
            const CSV_URL = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:csv&sheet=${SHEET_NAME}`;

            // Card colors matching the main app
            const noteColors = ['#fffc79', '#a0e7e5', '#f0a8a8', '#b4f8c8', '#fdc7b5'];

            let allTasks = [];
            let activeFilter = null;

            // --- CSV PARSER ---
            const parseCSV = (csvText) => {
                const rows = [];
                let current = '';
                let inQuotes = false;
                let row = [];

                for (let i = 0; i < csvText.length; i++) {
                    const char = csvText[i];
                    const nextChar = csvText[i + 1];

                    if (inQuotes) {
                        if (char === '"' && nextChar === '"') {
                            current += '"';
                            i++; // skip escaped quote
                        } else if (char === '"') {
                            inQuotes = false;
                        } else {
                            current += char;
                        }
                    } else {
                        if (char === '"') {
                            inQuotes = true;
                        } else if (char === ',') {
                            row.push(current.trim());
                            current = '';
                        } else if (char === '\n' || (char === '\r' && nextChar === '\n')) {
                            row.push(current.trim());
                            current = '';
                            if (row.length > 1 || row[0] !== '') rows.push(row);
                            row = [];
                            if (char === '\r') i++; // skip \n after \r
                        } else {
                            current += char;
                        }
                    }
                }

                // Push last row
                if (current || row.length > 0) {
                    row.push(current.trim());
                    if (row.length > 1 || row[0] !== '') rows.push(row);
                }

                return rows;
            };

            // --- PARSE TASK FROM MAIN SPREADSHEET FORMAT ---
            // Main spreadsheet columns: id, title, content, createdAt, completedAt, archived, tags, attachments
            const parseTask = (row, index) => {
                try {
                    const id = row[0] || '';
                    const title = row[1] || 'Untitled Task';
                    const contentJson = row[2] || '{}';
                    const createdAt = row[3] || '';
                    const completedAt = row[4] || '';
                    const archived = row[5] === 'TRUE';
                    const tagsJson = row[6] || '{}';

                    // Parse tags JSON
                    let tags = { people: [], modules: [] };
                    try { tags = JSON.parse(tagsJson); } catch (e) { }

                    // Parse content JSON to detect hibernation
                    let isHibernated = false;
                    try {
                        const content = JSON.parse(contentJson);
                        if (content._hibernation && content._hibernation.length > 0) {
                            const lastPeriod = content._hibernation[content._hibernation.length - 1];
                            if (!lastPeriod.end) isHibernated = true;
                        }
                    } catch (e) { }

                    // Derive status
                    let status = 'Active';
                    if (completedAt) status = 'Completed';
                    else if (isHibernated) status = 'Hibernated';

                    return {
                        id,
                        title,
                        status,
                        createdAt,
                        completedAt,
                        archived,
                        peopleTags: tags.people || [],
                        moduleTags: tags.modules || [],
                        color: noteColors[index % noteColors.length]
                    };
                } catch (e) {
                    console.error('Error parsing task row:', e, row);
                    return null;
                }
            };

            // --- DATA FETCHING ---
            const fetchData = async () => {
                const loadingEl = document.getElementById('loading-state');
                const errorEl = document.getElementById('error-state');

                loadingEl.style.display = 'flex';
                errorEl.style.display = 'none';

                try {
                    const response = await fetch(CSV_URL);

                    if (!response.ok) {
                        throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                    }

                    const csvText = await response.text();

                    if (!csvText.trim()) {
                        allTasks = [];
                        loadingEl.style.display = 'none';
                        render();
                        return;
                    }

                    const rows = parseCSV(csvText);

                    if (rows.length <= 1) {
                        allTasks = [];
                        loadingEl.style.display = 'none';
                        render();
                        return;
                    }

                    // Skip header row (row 0), parse each data row
                    const dataRows = rows.slice(1);
                    allTasks = dataRows
                        .map((row, index) => parseTask(row, index))
                        .filter(task => task && task.id && task.title);

                    loadingEl.style.display = 'none';
                    document.getElementById('last-synced').textContent = `Updated ${new Date().toLocaleTimeString()}`;
                    render();

                } catch (err) {
                    console.error('Failed to fetch dashboard data:', err);
                    loadingEl.style.display = 'none';

                    if (allTasks.length > 0) {
                        render();
                    } else {
                        errorEl.style.display = 'block';
                        errorEl.innerHTML = `
                            <div style="font-size: 32px; margin-bottom: 10px;">⚠️</div>
                            <div>Could not load dashboard data.</div>
                            <div style="font-size: 12px; margin-top: 8px; color: #999;">
                                Make sure the main spreadsheet is shared as "Anyone with the link → Viewer"
                            </div>
                        `;
                    }
                }
            };

            // --- RENDERING ---
            const getRelativeTime = (dateString) => {
                if (!dateString) return '';
                const date = new Date(dateString);
                if (isNaN(date.getTime())) return '';
                const now = new Date();
                const diffMs = now - date;
                const diffDays = Math.floor(diffMs / (1000 * 60 * 60 * 24));
                if (diffDays === 0) return 'today';
                if (diffDays === 1) return 'yesterday';
                if (diffDays < 30) return `${diffDays}d ago`;
                const diffMonths = Math.floor(diffDays / 30);
                if (diffMonths < 12) return `${diffMonths}mo ago`;
                return `${Math.floor(diffMonths / 12)}y ago`;
            };

            const escapeHtml = (text) => {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            };

            const createTaskCard = (task, index) => {
                const card = document.createElement('div');
                const isCompleted = task.status === 'Completed';
                const isHibernated = task.status === 'Hibernated';

                card.className = `task-card animate-in ${isCompleted ? 'completed' : ''} ${isHibernated ? 'hibernated' : ''}`;
                card.style.animationDelay = `${index * 0.04}s`;
                card.style.backgroundColor = task.color;

                let badgeHtml = '';
                if (isHibernated) {
                    badgeHtml = '<div class="hibernated-badge">💤</div>';
                }

                let metaHtml = '';
                if (isCompleted && task.completedAt) {
                    metaHtml = `<span>Completed ${getRelativeTime(task.completedAt)}</span>`;
                } else {
                    metaHtml = `<span>Started ${getRelativeTime(task.createdAt)}</span>`;
                }

                // Tags
                const allTags = [
                    ...task.peopleTags.map(t => `@${t}`),
                    ...task.moduleTags.map(t => `#${t}`)
                ];

                let tagsHtml = '';
                if (allTags.length > 0) {
                    tagsHtml = `
                        <div class="task-card-tags">
                            ${allTags.map(tag => `<span class="task-tag">${escapeHtml(tag)}</span>`).join('')}
                        </div>
                    `;
                }

                card.innerHTML = `
                    ${badgeHtml}
                    <div class="task-card-body">
                        <div class="task-card-title">${escapeHtml(task.title)}</div>
                        <div class="task-card-meta">
                            ${metaHtml}
                        </div>
                    </div>
                    ${tagsHtml}
                `;

                return card;
            };

            const getFilteredTasks = () => {
                if (!activeFilter) return allTasks;
                return allTasks.filter(task => {
                    return task.peopleTags.includes(activeFilter) || task.moduleTags.includes(activeFilter);
                });
            };

            const render = () => {
                const filteredTasks = getFilteredTasks();

                // Only show non-archived tasks
                const visibleTasks = filteredTasks.filter(t => !t.archived);

                const activeTasks = visibleTasks.filter(t => t.status === 'Active' || t.status === 'Hibernated');
                const completedTasks = visibleTasks.filter(t => t.status === 'Completed');

                // Sort: active by createdAt desc, completed by completedAt desc
                activeTasks.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
                completedTasks.sort((a, b) => new Date(b.completedAt) - new Date(a.completedAt));

                // Stats (always from all tasks, not filtered)
                const allVisible = allTasks.filter(t => !t.archived);
                const totalActive = allVisible.filter(t => t.status === 'Active' || t.status === 'Hibernated').length;
                const totalCompleted = allVisible.filter(t => t.status === 'Completed').length;
                const total = allVisible.length;
                const rate = total > 0 ? Math.round((totalCompleted / total) * 100) : 0;

                document.getElementById('stat-active').textContent = totalActive;
                document.getElementById('stat-completed').textContent = totalCompleted;
                document.getElementById('stat-rate').textContent = `${rate}%`;
                document.getElementById('stats-bar').style.display = 'flex';

                // Active section
                const activeGrid = document.getElementById('active-grid');
                const activeSection = document.getElementById('active-section');
                activeGrid.innerHTML = '';
                activeSection.style.display = 'block';
                document.getElementById('active-count').textContent = activeTasks.length;

                if (activeTasks.length > 0) {
                    activeTasks.forEach((task, i) => {
                        activeGrid.appendChild(createTaskCard(task, i));
                    });
                } else {
                    activeGrid.innerHTML = `
                        <div class="empty-state" style="grid-column: 1 / -1;">
                            <div class="empty-emoji">🎉</div>
                            <div>No active tasks — all clear!</div>
                        </div>
                    `;
                }

                // Completed section
                const completedGrid = document.getElementById('completed-grid');
                const completedSection = document.getElementById('completed-section');
                completedGrid.innerHTML = '';
                completedSection.style.display = 'block';
                document.getElementById('completed-count').textContent = completedTasks.length;

                if (completedTasks.length > 0) {
                    completedTasks.forEach((task, i) => {
                        completedGrid.appendChild(createTaskCard(task, i));
                    });
                } else {
                    completedGrid.innerHTML = `
                        <div class="empty-state" style="grid-column: 1 / -1;">
                            <div class="empty-emoji">📝</div>
                            <div>No completed tasks yet</div>
                        </div>
                    `;
                }

                // Filter bar
                renderFilterBar();
            };

            const renderFilterBar = () => {
                const filterBar = document.getElementById('filter-bar');
                const tagCounts = {};

                allTasks.filter(t => !t.archived).forEach(task => {
                    [...task.peopleTags, ...task.moduleTags].forEach(tag => {
                        tagCounts[tag] = (tagCounts[tag] || 0) + 1;
                    });
                });

                const sortedTags = Object.keys(tagCounts).sort((a, b) => tagCounts[b] - tagCounts[a]);
                filterBar.innerHTML = '';

                if (sortedTags.length === 0) return;

                // "All" chip
                const allChip = document.createElement('div');
                allChip.className = `filter-chip ${!activeFilter ? 'active' : ''}`;
                allChip.textContent = 'All';
                allChip.addEventListener('click', () => {
                    activeFilter = null;
                    render();
                });
                filterBar.appendChild(allChip);

                sortedTags.forEach(tag => {
                    const chip = document.createElement('div');
                    chip.className = `filter-chip ${activeFilter === tag ? 'active' : ''}`;
                    chip.textContent = `${tag} (${tagCounts[tag]})`;
                    chip.addEventListener('click', () => {
                        activeFilter = activeFilter === tag ? null : tag;
                        render();
                    });
                    filterBar.appendChild(chip);
                });
            };

            // --- INIT ---
            const init = () => {
                document.getElementById('refresh-btn').addEventListener('click', () => {
                    const btn = document.getElementById('refresh-btn');
                    btn.classList.add('spinning');
                    fetchData().finally(() => {
                        setTimeout(() => btn.classList.remove('spinning'), 800);
                    });
                });

                fetchData();
            };

            document.addEventListener('DOMContentLoaded', init);
        })();
    </script>
</body>

</html>
