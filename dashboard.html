<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#444444">
    <title>Daily Dive — Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600&display=swap"
        rel="stylesheet">

    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
        }

        :root {
            --background: #f7f8fc;
            --text-color: #333;
            --accent-color: #007aff;
            --shadow-color: rgba(0, 0, 0, 0.08);
            --dot-color: #d7d7d7;
            --card-radius: 12px;
            --section-gap: 40px;
        }

        body {
            font-family: 'Bricolage Grotesque', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--background);
            background-image: radial-gradient(circle, var(--dot-color) 1px, transparent 1px);
            background-size: 25px 25px;
            margin: 0;
            padding: 0;
            color: var(--text-color);
        }

        ::-webkit-scrollbar {
            display: none;
        }

        body {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .app-container {
            max-width: 1200px;
            margin: auto;
            position: relative;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* --- HEADER --- */
        header {
            display: flex;
            flex-direction: column;
            align-items: stretch;
            padding: 14px 26px 4px 26px;
            background-color: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            position: sticky;
            top: 0;
            z-index: 10;
            border-bottom-left-radius: 16px;
            border-bottom-right-radius: 16px;
        }

        .header-top-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            margin-bottom: 15px;
            gap: 10px;
        }

        header h1 {
            font-size: 22px;
            font-weight: 600;
            margin: 0;
        }

        .header-meta {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }

        .last-synced {
            font-size: 12px;
            color: rgba(0, 0, 0, 0.4);
        }

        .refresh-btn {
            background: none;
            border: 1px solid #ddd;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.3s ease, background-color 0.2s;
            color: #555;
        }

        .refresh-btn:hover {
            background-color: #eee;
        }

        .refresh-btn.spinning svg {
            animation: spin 0.8s ease-in-out;
        }

        @keyframes spin {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        /* --- FILTER BAR --- */
        .filter-bar-container {
            width: 100%;
            overflow-x: auto;
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .filter-bar-container::-webkit-scrollbar {
            display: none;
        }

        .filter-bar {
            display: flex;
            gap: 10px;
            padding: 8px 4px 16px 4px;
        }

        .filter-chip {
            padding: 6px 14px;
            border-radius: 18px;
            background-color: #e9e9f0;
            color: #555;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            white-space: nowrap;
            flex-shrink: 0;
            border: 1px solid transparent;
        }

        .filter-chip:hover {
            background-color: #dcdce5;
        }

        .filter-chip.active {
            background-color: var(--accent-color);
            color: white;
            box-shadow: 0 2px 8px rgba(0, 122, 255, 0.3);
        }

        .filter-chip--archive {
            background-color: #e8f5e9;
            color: #2e7d32;
            border: 1px solid #c8e6c9;
        }

        .filter-chip--archive:hover {
            background-color: #c8e6c9;
        }

        /* Mobile bottom filter bar - hidden by default, shown via media query */
        .filter-bar-container-mobile {
            display: none;
        }

        /* --- TASK GRID --- */

        .task-grid {
            padding: 25px;
            display: grid;
            grid-template-columns: repeat(auto-fit, 320px);
            gap: 25px;
            justify-content: center;
            flex-grow: 1;
            align-content: start;
        }

        /* --- LOADING & EMPTY STATES --- */
        .loading-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 20px;
            gap: 15px;
        }

        .loader-spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--accent-color);
            border-radius: 50%;
            width: 36px;
            height: 36px;
            animation: spin 1s linear infinite;
        }

        .loading-text {
            font-size: 14px;
            color: rgba(0, 0, 0, 0.4);
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: rgba(0, 0, 0, 0.35);
            font-size: 15px;
        }

        .empty-state .empty-emoji {
            font-size: 40px;
            margin-bottom: 10px;
        }

        .error-state {
            background: #fff0f0;
            border: 1px solid #ffd0d0;
            border-radius: var(--card-radius);
            padding: 20px;
            text-align: center;
            color: #c00;
            font-size: 14px;
        }

        /* --- ANIMATIONS --- */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px) rotate(var(--start-rotation-deg, 0deg));
            }

            to {
                opacity: 1;
                transform: translateY(0) rotate(var(--rotation-deg, 0deg));
            }
        }

        .animate-in {
            animation: fadeInUp 0.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
            opacity: 0;
        }

        /* --- RESPONSIVE --- */
        @media (max-width: 600px) {
            .app-container {
                padding: 15px 15px 40px;
            }

            header h1 {
                font-size: 18px;
            }

            .stats-bar {
                gap: 10px;
            }

            .stat-card {
                min-width: 90px;
                padding: 14px 10px;
            }

            .stat-value {
                font-size: 28px;
            }

            .task-grid {
                grid-template-columns: 1fr;
                gap: 15px;
            }

            .task-item {
                height: 205px;
            }
        }

        .task-item {
            height: 220px;
            box-shadow: 0 4px 12px var(--shadow-color);
            transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1), box-shadow 0.2s ease, opacity 0.5s ease;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
            border-radius: 12px;
            border: 1px solid #ffffff;
            transform: rotate(var(--rotation-deg, 0deg));
        }

        .task-item:has(.task-content:active) {
            transform: rotate(var(--rotation-deg, 0deg)) scale(0.97);
            transition-duration: 0.05s;
        }

        @media (hover: hover) {
            .task-item:hover {
                transform: rotate(0deg) scale(1.02) translateY(-2px);
                box-shadow: 0 8px 20px var(--shadow-color);
                z-index: 10;
            }
        }

        .task-item:active {
            transform: rotate(0deg) scale(0.95) translateY(0);
            box-shadow: 0 2px 8px var(--shadow-color);
            transition-duration: 0.1s;
        }

        .task-item.is-interacting {
            z-index: 10;
            box-shadow: 0 8px 20px var(--shadow-color);
            transform: rotate(0deg) scale(1.03) translateY(-5px) !important;
            transition-duration: 0.25s;
        }

        .task-content {
            padding: 20px 22px;
            font-size: 18px;
            line-height: 1.5;
            width: 100%;
            flex-grow: 1;
            box-sizing: border-box;
            user-select: none;
            transition: color 0.3s, transform 0.3s ease;
            cursor: grab;
            background: transparent;
            border: none;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            /* ADDED: Helps browser distinguish scroll vs swipe */
            touch-action: pan-y;
        }

        .task-item.completed,
        .task-item.hibernated {
            opacity: 0.7;
        }

        .task-item.completed .task-content {
            color: rgba(0, 0, 0, 0.5);
            cursor: default;
        }

        .task-item.completed .task-text-display {
            text-decoration: line-through;
        }

        .task-item.is-completing .task-content .task-text-display {
            text-decoration: line-through;
            color: rgba(0, 0, 0, 0.5);
        }

        .task-tags-container {
            padding: 0 10px 10px 10px;
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
        }

        .task-tag {
            background-color: rgba(0, 0, 0, 0.07);
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 12px;
        }

        .archive-btn {
            background-color: var(--archive-bg);
            color: white;
            border: none;
            cursor: pointer;
            width: 100px;
            align-self: stretch;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            opacity: 0;
            position: absolute;
            right: 0;
            top: 0;
            bottom: 0;
            transform: translateX(100%);
            transition: opacity 0.3s ease, transform 0.3s ease;
            flex-direction: column;
            gap: 5px;
            line-height: 1;
        }

        .days-to-complete {
            font-size: 11px;
            font-weight: 500;
        }

        .task-item.completed .archive-btn {
            opacity: 1;
            transform: translateX(0);
            transition-delay: 0.6s;
        }

        .task-item.is-sliding-complete {
            opacity: 0.7;
        }

        .task-item.is-sliding-uncomplete {
            opacity: 1;
        }

        .task-item.is-sliding-uncomplete .archive-btn {
            opacity: 0;
            transform: translateX(100%);
            transition-delay: 0s;
        }

        .uncomplete-placeholder {
            width: 40px;
            font-size: 24px;
            color: var(--accent-color);
            opacity: 0;
            transition: opacity 0.3s ease;
            position: absolute;
            right: 0;
            top: 0;
            bottom: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #add-task-btn {
            position: fixed;
            bottom: 30px;
            right: calc(50% - min(600px, 50vw) + 30px);
            width: 60px;
            height: 60px;
            background-color: var(--accent-color);
            color: white;
            border: none;
            border-radius: 50%;
            font-size: 36px;
            box-shadow: 0 6px 15px rgba(0, 122, 255, 0.4);
            cursor: pointer;
            z-index: 100;
            transition: transform 0.3s ease, opacity 0.3s ease;
        }

        #add-task-btn:hover {
            transform: scale(1.05);
        }

        #calendar-view {
            display: none;
            padding: 20px;
        }

        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .calendar-header h2 {
            margin: 0;
            text-align: center;
            flex-grow: 1;
        }

        .calendar-nav-btn {
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            font-size: 20px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .calendar-nav-btn:hover {
            background-color: #f7f7f7;
        }

        .calendar-grid-container {}

        #calendar-wrapper {
            overflow: hidden;
        }

        #calendar-slider {
            display: flex;
            width: 300%;
            position: relative;
            transform: translateX(-33.3333%);
        }

        .calendar-month-grid {
            width: 33.3333%;
            position: relative;
            /* Removed flex properties and min-height to allow this container to grow vertically with its content. */
        }

        .day-grid-wrapper {
            position: relative;
            /* Changed from 'absolute' so this element exists in the page's layout flow. */
            /* Removed top, left, and height, so its size is determined by the actual grid rows. */
            width: 100%;
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            transition: opacity 0.4s ease-in-out;
        }

        .loading-text {
            font-size: 20px;
            font-weight: 500;
            color: #a0a0a0;
            text-align: center;
        }

        .calendar-weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            text-align: center;
            padding: 10px 0;
            font-weight: bold;
            color: #777;
        }

        #calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            grid-auto-rows: minmax(120px, auto);
            position: relative;
        }

        .day-cell {
            border-right: 1px solid #eee;
            border-top: 1px solid #eee;
            padding: 8px;
            position: relative;
        }

        .day-cell:nth-child(7n) {
            border-right: none;
        }

        .day-cell.other-month .day-number {
            color: #ccc;
        }

        .day-cell.today .day-number {
            background-color: var(--accent-color);
            color: white;
        }

        .day-cell .day-number {
            cursor: pointer;
            transition: transform 0.2s ease;
            width: 28px;
            height: 28px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }

        .day-cell .day-number:hover {
            transform: scale(1.1);
        }

        .day-cell.holiday {
            background-color: #dadada;
        }

        .task-bar {
            position: absolute;
            height: 24px;
            color: #1f1f1f;
            text-shadow: 0 0 2px rgba(255, 255, 255, 0.6);
            border-radius: 4px;
            font-size: 12px;
            padding: 0 8px;
            box-sizing: border-box;
            line-height: 24px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            z-index: 1;
            cursor: pointer;
            border: 1px solid rgba(0, 0, 0, 0.05);
        }

        .task-bar.completed {
            background-image: repeating-linear-gradient(45deg,
                    rgba(0, 0, 0, 0.1),
                    rgba(0, 0, 0, 0.1) 4px,
                    transparent 4px,
                    transparent 8px);
        }

        .task-bar.has-prev-indicator {
            padding-left: 28px;
        }

        .task-bar.has-next-indicator {
            padding-right: 28px;
        }

        .task-continuation-indicator {
            position: absolute;
            top: -1px;
            bottom: -1px;
            width: 20px;
            background: rgba(0, 0, 0, 0.07);
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(0, 0, 0, 0.6);
            font-size: 14px;
            font-weight: bold;
        }

        .task-continuation-indicator.prev {
            left: 0;
            border-top-left-radius: 4px;
            border-bottom-left-radius: 4px;
        }

        .task-continuation-indicator.next {
            right: 0;
            border-top-right-radius: 4px;
            border-bottom-right-radius: 4px;
        }

        #modal-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 550;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        #modal-container.show {
            opacity: 1;
        }

        .modal-content {
            text-align: center;
            transform: scale(0.95);
            transition: transform 0.5s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        #modal-container.show .modal-content {
            transform: scale(1);
        }

        .modal-controls {
            margin-top: 20px;
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .modal-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: none;
            font-size: 24px;
            margin: 0;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            transition: transform .2s ease, background-color .2s;
        }

        .modal-btn:hover {
            transform: scale(1.1);
        }

        .modal-btn#confirm-add-btn {
            background-color: #28a745;
            color: white;
        }

        .modal-btn#hibernate-btn {
            background-color: var(--hibernate-color);
            color: white;
        }

        .modal-btn#modal-back-btn {
            background-color: transparent;
            color: #555;
            box-shadow: none;
            padding: 0;
            display: none;
            align-items: center;
            justify-content: center;
        }

        .modal-btn#modal-back-btn:hover {
            background-color: rgba(0, 0, 0, 0.05);
            transform: scale(1.1);
        }

        .is-entering {
            opacity: 0;
            transform: translateY(-60px) scale(1.1) rotate(var(--start-rotation-deg));
        }

        @keyframes cardBounce {

            0%,
            100% {
                transform: scale(1) rotate(var(--rotation-deg));
            }

            30% {
                transform: scale(0.95) rotate(var(--rotation-deg));
            }

            60% {
                transform: scale(1.05) rotate(var(--rotation-deg));
            }
        }

        .task-edited-animation {
            animation: cardBounce 0.6s ease-in-out;
        }

        @keyframes taskBarBlink {

            0%,
            50%,
            100% {
                opacity: 1;
            }

            25%,
            75% {
                opacity: 0.4;
            }
        }

        .task-bar-edited-animation {
            animation: taskBarBlink 0.8s ease-in-out;
        }

        .time-ago {
            font-size: 12px;
            color: rgba(0, 0, 0, 0.5);
            margin-bottom: 8px;
        }

        .modal-note {
            width: 440px;
            max-width: 95vw;
            background-color: #fffc79;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            max-height: 80vh;
        }

        #modal-note-content {
            flex-grow: 1;
            overflow-y: auto;
            padding: 0 25px;
        }

        #task-title-input,
        .daily-entry-textarea {
            font-family: 'Bricolage Grotesque', sans-serif;
        }

        #task-title-input {
            background: transparent;
            border: none;
            outline: none;
            padding: 25px 0 15px 0;
            font-size: 22px;
            font-weight: 600;
            line-height: 1.3;
            box-sizing: border-box;
            width: 100%;
            border-bottom: 1px solid rgba(0, 0, 0, 0.1);
            resize: none;
            overflow-y: hidden;
        }

        .daily-entry-container {
            margin-top: 15px;
        }

        /* This class seems unused, can be removed */
        .daily-entry-date {
            font-size: 12px;
            font-weight: bold;
            color: rgba(0, 0, 0, 0.6);
            margin: 2px 0 8px 6px;
            text-align: left;
            letter-spacing: 0.4px;
            pointer-events: none;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .daily-entry-date.is-holiday {
            color: #e57373;
            cursor: pointer;
            letter-spacing: 0.4px;
            pointer-events: none;
        }

        .daily-entry-textarea {
            background: transparent;
            min-height: 60px;
            border: none;
            outline: none;
            width: 100%;
            font-size: 16px;
            line-height: 1.5;
            box-sizing: border-box;
            resize: none;
            text-align: left;
            transition: background-color 0.5s ease;
            padding: 6px;
            /* Symmetrical padding for consistency */
            /* Normalization styles to ensure consistency between div and textarea */
            display: block;
            margin: 0;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .hibernation-event-pill {
            font-size: 10px;
            font-weight: 500;
            padding: 2px 8px;
            border-radius: 10px;
            color: #fff;
        }

        .hibernation-event-pill.hibernated,
        .hibernation-event-pill.activated {
            background-color: rgba(0, 0, 0, 0.12);
            color: #464646;
        }

        .hibernation-event-pill.completed {
            background-color: var(--checkmark-color);
        }

        /* Attachment Pills in Modal */
        #task-attachments-scroll {
            display: flex;
            overflow-x: auto;
            gap: 8px;
            padding: 4px 15px 12px 0;
            margin-top: 8px;
            -ms-overflow-style: none;
            /* Hide scrollbar for IE/Edge */
            scrollbar-width: none;
            /* Hide scrollbar for Firefox */
        }

        #task-attachments-scroll::-webkit-scrollbar {
            display: none;
            /* Hide scrollbar for Chrome/Safari */
        }

        .attachment-pill {
            display: flex;
            align-items: center;
            gap: 6px;
            background-color: rgba(0, 0, 0, 0.05);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
            color: #444;
            white-space: nowrap;
            text-decoration: none;
            transition: background-color 0.2s;
            border: 1px solid rgba(0, 0, 0, 0.05);
        }

        .attachment-pill:hover {
            background-color: rgba(0, 0, 0, 0.1);
        }

        .attachment-pill img {
            display: block;
        }

        /* ===== RESPONSIVE / MOBILE ===== */
        .daily-entry-textarea.is-editing {
            padding: 0;
        }

        /* --- TIMELINE VIEW STYLES --- */
        #daily-entries-wrapper.timeline-view {
            position: relative;
            padding: 15px 0 15px 20px;
        }

        .timeline-entry {
            display: flex;
            position: relative;
            align-items: flex-start;
            /* Align items to the top */
            padding-bottom: 20px;
        }

        .timeline-marker {
            position: absolute;
            left: -20px;
            top: 0;
            width: 20px;
            height: 100%;
            display: flex;
            align-items: center;
        }

        .timeline-dot {
            width: 11px;
            height: 11px;
            border-radius: 50%;
            background-color: rgba(0, 0, 0, 0.2);
            z-index: 2;
            position: absolute;
            top: 5px;
            left: 4.5px;
            /* (20px marker width - 11px dot width) / 2 */
        }

        .timeline-line {
            position: absolute;
            top: 16px;
            /* Start the line just below the dot */
            width: 1px;
            left: 9.5px;
            /* (20px marker width - 1px line width) / 2 */
            height: calc(100% - 16px);
            /* End the line before the next dot starts */
            background-color: rgba(0, 0, 0, 0.1);
        }

        @media (max-width: 768px) {
            .app-container {
                padding-top: 0;
                padding-bottom: 100px;
            }

            body {
                padding-bottom: 16px;
            }

            header {
                padding: 12px 16px 12px 16px;
                border-bottom-left-radius: 12px;
                border-bottom-right-radius: 12px;
            }

            .header-top-row {
                margin-bottom: 0;
            }

            /* Hide filter bar inside header on mobile */
            header .filter-bar-container {
                display: none;
            }

            /* Bottom fixed filter bar for mobile */
            .filter-bar-container-mobile {
                display: flex !important;
                position: fixed;
                bottom: 0;
                left: 0;
                right: 0;
                z-index: 100;
                background-color: rgba(255, 255, 255, 0.85);
                backdrop-filter: blur(12px);
                -webkit-backdrop-filter: blur(12px);
                border-top: 1px solid rgba(0, 0, 0, 0.08);
                overflow-x: auto;
                -ms-overflow-style: none;
                scrollbar-width: none;
                padding: 10px 12px;
                padding-bottom: max(10px, env(safe-area-inset-bottom));
            }

            .filter-bar-container-mobile::-webkit-scrollbar {
                display: none;
            }

            .task-grid {
                padding: 16px;
                gap: 16px;
                grid-template-columns: 1fr;
                padding-bottom: 100px;
                /* space for bottom filter bar */
            }

            .task-item {
                width: 100% !important;
                min-width: unset !important;
                max-width: 100% !important;
            }

            .archive-month-grid {
                grid-template-columns: 1fr;
            }

            .archive-header-top-row {
                padding: 0 16px;
            }

            .archive-content {
                padding: 16px;
            }

            /* Modal adjustments */
            .modal-content {
                width: 95%;
                margin: 10px;
            }

            .modal-note {
                max-height: 85vh;
            }

            .filter-chip {
                font-size: 13px;
                padding: 5px 12px;
            }
        }

        @media (max-width: 480px) {
            header h1 {
                font-size: 16px;
            }

            .task-grid {
                padding: 12px;
                gap: 14px;
            }

            .last-synced {
                font-size: 10px;
            }

            .refresh-btn {
                width: 32px;
                height: 32px;
            }

            .header-meta {
                gap: 8px;
            }

            .archive-header-top-row {
                padding: 0 12px;
            }

            .archive-content {
                padding: 12px;
            }

            .archive-month-header {
                font-size: 12px;
            }
        }
    </style>
</head>

<body>
    <div class="app-container">
        <header>
            <div class="header-top-row">
                <h1>📋 I'm working on</h1>
                <div class="header-meta">
                    <div id="last-synced" class="last-synced"></div>
                    <button id="refresh-btn" class="refresh-btn" title="Refresh Data">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="23 4 23 10 17 10"></polyline>
                            <polyline points="1 20 1 14 7 14"></polyline>
                            <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15">
                            </path>
                        </svg>
                    </button>
                </div>
            </div>
            <div class="filter-bar-container">
                <div id="filter-bar" class="filter-bar"></div>
            </div>
        </header>

        <!-- Tasks Section -->
        <div id="tasks-section" class="section">
            <div id="tasks-grid" class="task-grid"></div>
        </div>

        <!-- Loading State -->
        <div id="loading-state" class="loading-container">
            <div class="loader-spinner"></div>
            <div class="loading-text">Loading dashboard data...</div>
        </div>

        <!-- Error State -->
        <div id="error-state" class="error-state" style="display: none;"></div>
    </div>

    <div id="modal-container">
        <div class="modal-content">
            <form id="task-form">
                <div class="modal-note">
                    <div id="modal-note-content">
                        <textarea id="task-title-input" placeholder="Task Title..." rows="1"
                            enterkeyhint="done"></textarea>
                        <div id="task-attachments-scroll"></div>
                        <div id="daily-entries-wrapper"></div>
                    </div>
                    <div id="modal-note-footer">
                        <div class="tag-section-modal">
                            <h3 class="tag-title-modal">People</h3>
                            <div id="people-chip-container" class="chip-container"></div>
                        </div>
                        <div class="tag-section-modal">
                            <h3 class="tag-title-modal">Modules</h3>
                            <div id="module-chip-container" class="chip-container"></div>
                        </div>
                    </div>
                </div>
                <div class="modal-controls">
                    <button id="modal-back-btn" class="modal-btn" type="button">
                        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M6 9l6 6 6-6" />
                        </svg>
                    </button>
                    <button id="confirm-add-btn" class="modal-btn" type="submit">&#10003;</button>
                    <button id="hibernate-btn" class="modal-btn" type="button">💤</button>
                </div>
            </form>
        </div>
    </div>

    <div id="attachment-modal-container">
        <div class="attachment-modal-content">
            <h2 id="attachment-modal-icon"></h2>
            <input id="attachment-title-input" placeholder="Add a title (optional)" rows="1"
                style=" font-weight: bold; font-size: 16px;"></textarea>
            <textarea id="attachment-url-input" placeholder="https://example.com" rows="1"></textarea>
            <div id="attachment-modal-buttons" class="confirmation-modal-buttons" style="margin-top: 20px;">
                <button id="attachment-modal-delete-btn"
                    style="background-color: var(--delete-color); color: white; display: none;">Delete</button>
                <button id="attachment-modal-save-btn">Save Link</button>
            </div>
        </div>
    </div>

    <div id="confirmation-modal-container">
        <div class="confirmation-modal-content">
            <div id="confirmation-modal-icon"></div>
            <p id="confirmation-modal-message"></p>
            <div class="confirmation-modal-buttons">
                <button id="confirmation-modal-cancel-btn">Cancel</button>
                <button id="confirmation-modal-confirm-btn">Yes, Delete</button>
            </div>
        </div>
    </div>

    <div id="redirection-modal-container">
        <div class="redirection-modal-content">
            <div class="loader"></div>
            <p class="redirection-text">Opening <span id="redirection-title"></span>...</p>
            <div id="redirection-url"></div>
        </div>
    </div>

    <!-- Completed (Archive) View Overlay -->
    <div id="archive-view" class="archive-view-container">
        <div class="archive-header">
            <div class="archive-header-top-row">
                <h2>Completed Tasks</h2>
                <button class="close-archive-btn" id="close-archive-btn">&times;</button>
            </div>
        </div>
        <div class="archive-content" id="archive-content">
            <!-- Rendered by JS -->
        </div>
    </div>

    <!-- Mobile bottom filter bar -->
    <div class="filter-bar-container-mobile">
        <div id="filter-bar-mobile" class="filter-bar"></div>
    </div>

    <script>
        (function () {
            // --- CONFIG ---
            // This reads directly from the MAIN spreadsheet (must be set to "Anyone with the link → Viewer")
            const SPREADSHEET_ID = '1J9xENB3Fz3laJlMsz5mdojXu0BbJ3oCNE5LxHRaI128';
            const SHEET_NAME = 'tasks';
            const CSV_URL = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:csv&sheet=${SHEET_NAME}`;

            // Card colors matching the main app
            const noteColors = ['#fffc79', '#a0e7e5', '#f0a8a8', '#b4f8c8', '#fdc7b5'];

            let allTasks = [];
            let activeFilter = null;
            let showArchived = false; // toggle between Active and Archived views

            // --- CSV PARSER ---
            const parseCSV = (csvText) => {
                const rows = [];
                let current = '';
                let inQuotes = false;
                let row = [];

                for (let i = 0; i < csvText.length; i++) {
                    const char = csvText[i];
                    const nextChar = csvText[i + 1];

                    if (inQuotes) {
                        if (char === '"' && nextChar === '"') {
                            current += '"';
                            i++; // skip escaped quote
                        } else if (char === '"') {
                            inQuotes = false;
                        } else {
                            current += char;
                        }
                    } else {
                        if (char === '"') {
                            inQuotes = true;
                        } else if (char === ',') {
                            row.push(current.trim());
                            current = '';
                        } else if (char === '\n' || (char === '\r' && nextChar === '\n')) {
                            row.push(current.trim());
                            current = '';
                            if (row.length > 1 || row[0] !== '') rows.push(row);
                            row = [];
                            if (char === '\r') i++; // skip \n after \r
                        } else {
                            current += char;
                        }
                    }
                }

                // Push last row
                if (current || row.length > 0) {
                    row.push(current.trim());
                    if (row.length > 1 || row[0] !== '') rows.push(row);
                }

                return rows;
            };

            // --- PARSE TASK FROM MAIN SPREADSHEET FORMAT ---
            // Main spreadsheet columns: id, title, content, createdAt, completedAt, archived, tags, attachments
            const parseTask = (row, index) => {
                try {
                    const id = row[0] || '';
                    const title = row[1] || 'Untitled Task';
                    const contentJson = row[2] || '{}';
                    const createdAt = row[3] || '';
                    const completedAt = row[4] || '';
                    const archived = row[5] === 'TRUE';
                    const tagsJson = row[6] || '{}';

                    // Parse tags JSON
                    let tags = { people: [], modules: [] };
                    try { tags = JSON.parse(tagsJson); } catch (e) { }

                    // Parse attachments JSON
                    const attachmentsJson = row[7] || '[]';
                    let attachments = [];
                    try { attachments = JSON.parse(attachmentsJson); } catch (e) { }

                    // Parse content JSON to detect hibernation
                    let isHibernated = false;
                    try {
                        const content = JSON.parse(contentJson);
                        if (content._hibernation && content._hibernation.length > 0) {
                            const lastPeriod = content._hibernation[content._hibernation.length - 1];
                            if (!lastPeriod.end) isHibernated = true;
                        }
                    } catch (e) { }

                    // Derive status
                    let status = 'Active';
                    if (completedAt) status = 'Completed';
                    else if (isHibernated) status = 'Hibernated';

                    return {
                        id,
                        title,
                        status,
                        createdAt,
                        completedAt,
                        archived,
                        peopleTags: (tags.people || []).map(t => t.replace(/^@/, '')),
                        moduleTags: (tags.modules || []).map(t => t.replace(/^#/, '')),
                        color: noteColors[index % noteColors.length],
                        content: (typeof contentJson === 'string' && contentJson.trim().startsWith('{')) ? JSON.parse(contentJson) : {},
                        tags: tags,
                        attachments: attachments
                    };
                } catch (e) {
                    console.error('Error parsing task row:', e, row);
                    return null;
                }
            };

            // --- DATA FETCHING ---
            const fetchData = async () => {
                const loadingEl = document.getElementById('loading-state');
                const errorEl = document.getElementById('error-state');

                loadingEl.style.display = 'flex';
                errorEl.style.display = 'none';

                try {
                    const response = await fetch(CSV_URL);

                    if (!response.ok) {
                        throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                    }

                    const csvText = await response.text();

                    if (!csvText.trim()) {
                        allTasks = [];
                        loadingEl.style.display = 'none';
                        render();
                        return;
                    }

                    const rows = parseCSV(csvText);

                    if (rows.length <= 1) {
                        allTasks = [];
                        loadingEl.style.display = 'none';
                        render();
                        return;
                    }

                    // Skip header row (row 0), parse each data row
                    const dataRows = rows.slice(1);
                    allTasks = dataRows
                        .map((row, index) => parseTask(row, index))
                        .filter(task => task && task.id && task.title);

                    loadingEl.style.display = 'none';
                    document.getElementById('last-synced').textContent = `Updated ${new Date().toLocaleTimeString()}`;
                    render();

                } catch (err) {
                    console.error('Failed to fetch dashboard data:', err);
                    loadingEl.style.display = 'none';

                    if (allTasks.length > 0) {
                        render();
                    } else {
                        errorEl.style.display = 'block';
                        errorEl.innerHTML = `
                            <div style="font-size: 32px; margin-bottom: 10px;">⚠️</div>
                            <div>Could not load dashboard data.</div>
                            <div style="font-size: 12px; margin-top: 8px; color: #999;">
                                Make sure the main spreadsheet is shared as "Anyone with the link → Viewer"
                            </div>
                        `;
                    }
                }
            };

            // --- RENDERING ---
            const getRelativeTime = (dateString) => {
                if (!dateString) return '';
                const date = new Date(dateString);
                if (isNaN(date.getTime())) return '';
                const now = new Date();
                const diffMs = now - date;
                const diffDays = Math.floor(diffMs / (1000 * 60 * 60 * 24));
                if (diffDays === 0) return 'today';
                if (diffDays === 1) return 'yesterday';
                if (diffDays < 30) return `${diffDays}d ago`;
                const diffMonths = Math.floor(diffDays / 30);
                if (diffMonths < 12) return `${diffMonths}mo ago`;
                return `${Math.floor(diffMonths / 12)}y ago`;
            };


            const escapeHtml = (text) => {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            };

            const autoGrow = (element) => {
                element.style.height = '1px';
                element.style.height = (element.scrollHeight + 2) + 'px'; // +2 for buffer
            };

            const isTaskHibernated = (task) => task.status === 'Hibernated';

            const showModal = (task) => {
                const modalContainer = document.getElementById('modal-container');
                const taskTitleInput = document.getElementById('task-title-input');
                const taskAttachmentsScroll = document.getElementById('task-attachments-scroll');
                const dailyEntriesWrapper = document.getElementById('daily-entries-wrapper');
                const peopleChipContainer = document.getElementById('people-chip-container');
                const moduleChipContainer = document.getElementById('module-chip-container');
                const hibernateBtn = document.getElementById('hibernate-btn');

                taskAttachmentsScroll.innerHTML = ''; // Clear previous attachments
                peopleChipContainer.innerHTML = ''; // Clear previous people tags
                moduleChipContainer.innerHTML = ''; // Clear previous module tags
                dailyEntriesWrapper.innerHTML = ''; // Clear previous daily entries

                const modalParams = {
                    title: task.title || 'Untitled',
                    content: task.content || {},
                    tags: task.tags || { people: task.peopleTags || [], modules: task.moduleTags || [] },
                    attachments: task.attachments || []
                };

                taskTitleInput.value = modalParams.title;
                taskTitleInput.readOnly = true;
                setTimeout(() => autoGrow(taskTitleInput), 0);

                document.getElementById('confirm-add-btn').style.display = 'none';
                document.getElementById('hibernate-btn').style.display = 'none';

                dailyEntriesWrapper.className = 'timeline-view';

                const sortedKeys = Object.keys(modalParams.content).filter(k => k !== '_hibernation').sort().reverse();

                if (sortedKeys.length === 0) {
                    const emptyState = document.createElement('div');
                    emptyState.style.padding = '20px';
                    emptyState.style.textAlign = 'center';
                    emptyState.style.color = '#777';
                    emptyState.textContent = 'No journal entries yet.';
                    dailyEntriesWrapper.appendChild(emptyState);
                } else {
                    sortedKeys.forEach((key, idx) => {
                        const entryText = modalParams.content[key];
                        const entryDiv = document.createElement('div');
                        entryDiv.className = 'timeline-entry';

                        const dateObj = new Date(key);
                        let dateStr = key;
                        if (!isNaN(dateObj.getTime())) {
                            dateStr = dateObj.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
                        }

                        let lineHtml = (idx < sortedKeys.length - 1) ? '<div class="timeline-line"></div>' : '';

                        entryDiv.innerHTML = `
                            <div class="timeline-marker">
                                <div class="timeline-dot"></div>
                                ${lineHtml}
                            </div>
                            <div class="timeline-content">
                                <div class="daily-entry-date">${dateStr}</div>
                                <div class="daily-entry-textarea" style="opacity: 0.8;">${escapeHtml(entryText)}</div>
                            </div>
                        `;
                        dailyEntriesWrapper.appendChild(entryDiv);
                    });
                }

                const renderTags = (container, tagsArray) => {
                    if (!tagsArray || tagsArray.length === 0) {
                        container.innerHTML = '<span style="color: #999; font-size: 13px;">None</span>';
                        return;
                    }
                    tagsArray.forEach(t => {
                        const chip = document.createElement('div');
                        chip.className = 'chip';
                        chip.textContent = t;
                        container.appendChild(chip);
                    });
                };

                renderTags(peopleChipContainer, modalParams.tags.people);
                renderTags(moduleChipContainer, modalParams.tags.modules);

                if (isTaskHibernated(task)) {
                    hibernateBtn.title = 'Un-hibernate Task';
                } else {
                    hibernateBtn.title = 'Hibernate Task';
                }

                if (modalParams.attachments && modalParams.attachments.length > 0) {
                    modalParams.attachments.forEach(attachment => {
                        const pill = document.createElement('a');
                        pill.className = 'attachment-pill';
                        pill.href = attachment.url;
                        pill.target = '_blank';
                        pill.onclick = (e) => e.stopPropagation();

                        let iconHTML = '📄';
                        if (attachment.url && attachment.url.includes('figma.com')) {
                            iconHTML = `<img src="figma.png" alt="Figma" width="16" height="16">`;
                        } else if (attachment.url && attachment.url.includes('atlassian.net')) {
                            iconHTML = `<img src="jira.png" alt="Jira" width="16" height="16">`;
                        }

                        pill.innerHTML = `${iconHTML}<span>${attachment.title || 'Untitled'}</span>`;
                        taskAttachmentsScroll.appendChild(pill);
                    });
                    taskAttachmentsScroll.style.display = 'flex';
                } else {
                    taskAttachmentsScroll.style.display = 'none';
                }

                modalContainer.style.display = 'flex';
                void modalContainer.offsetWidth;
                modalContainer.classList.add('show');
            };

            const hideModal = () => {
                const modal = document.getElementById('modal-container');
                modal.classList.remove('show');
                setTimeout(() => {
                    modal.style.display = 'none';
                    // Clear content after hiding
                    document.getElementById('task-attachments-scroll').innerHTML = '';
                    document.getElementById('daily-entries-wrapper').innerHTML = '';
                    document.getElementById('people-chip-container').innerHTML = '';
                    document.getElementById('module-chip-container').innerHTML = '';
                }, 500);
            };

            document.getElementById('task-title-input').addEventListener('input', (e) => autoGrow(e.target));

            document.getElementById('modal-container').addEventListener('click', (e) => {
                if (e.target === document.getElementById('modal-container')) {
                    hideModal();
                }
            });

            document.getElementById('modal-back-btn').addEventListener('click', hideModal);

            const createTaskCard = (task, index) => {
                const taskItem = document.createElement('div');
                taskItem.className = 'task-item animate-in';
                taskItem.style.animationDelay = `${index * 0.04}s`;

                const isCompleted = task.status === 'Completed';
                const isHibernated = task.status === 'Hibernated';

                if (isCompleted) taskItem.classList.add('completed');
                else if (isHibernated) taskItem.classList.add('hibernated');

                taskItem.dataset.id = task.id;
                taskItem.style.backgroundColor = task.color;

                // Remove animation class after it finishes so standard CSS transitions work
                taskItem.addEventListener('animationend', (e) => {
                    if (e.animationName === 'fadeInUp') {
                        taskItem.classList.remove('animate-in');
                    }
                }, { once: true });

                const rotation = (index % 2 === 0 ? 1 : -1);
                const startRotation = (rotation > 0) ? -5 : 5;
                taskItem.style.setProperty('--rotation-deg', `${rotation}deg`);
                taskItem.style.setProperty('--start-rotation-deg', `${startRotation}deg`);

                const taskContent = document.createElement('div');
                taskContent.className = 'task-content';

                const timeAgo = document.createElement('div');
                timeAgo.className = 'time-ago';

                if (isCompleted && task.completedAt) {
                    timeAgo.textContent = `Completed ${getRelativeTime(task.completedAt)}`;
                } else if (isHibernated) {
                    timeAgo.textContent = 'Hibernated';
                } else {
                    timeAgo.textContent = `Started ${getRelativeTime(task.createdAt)}`;
                }
                taskContent.appendChild(timeAgo);

                const textDisplay = document.createElement('div');
                textDisplay.className = 'task-text-display';

                const titleDisplay = document.createElement('div');
                titleDisplay.className = 'task-text-title';
                titleDisplay.textContent = task.title || 'Untitled Task';
                textDisplay.appendChild(titleDisplay);

                let latestEntryDisplay = null;
                if (typeof task.content === 'object' && task.content !== null) {
                    const contentKeys = Object.keys(task.content).filter(k => k !== '_hibernation').sort().reverse();
                    if (contentKeys.length > 0) {
                        const latestEntryText = task.content[contentKeys[0]];
                        latestEntryDisplay = document.createElement('div');
                        latestEntryDisplay.className = 'task-text-latest-entry';
                        latestEntryDisplay.textContent = latestEntryText;
                        textDisplay.appendChild(latestEntryDisplay);
                    }
                }
                taskContent.appendChild(textDisplay);

                const tagsContainer = document.createElement('div');
                tagsContainer.className = 'task-tags-container';
                const allTags = [
                    ...(task.peopleTags || []),
                    ...(task.moduleTags || [])
                ];
                allTags.forEach(tagText => {
                    const tagEl = document.createElement('span');
                    tagEl.className = 'task-tag';
                    tagEl.textContent = tagText;
                    tagsContainer.appendChild(tagEl);
                });

                taskItem.appendChild(taskContent);
                taskItem.appendChild(tagsContainer);

                const attachmentDisplay = document.createElement('div');
                attachmentDisplay.className = 'sticker-display-area';
                if (isHibernated) {
                    const hibernateIcon = document.createElement('div');
                    hibernateIcon.textContent = '💤';
                    hibernateIcon.style.fontSize = '20px';
                    attachmentDisplay.appendChild(hibernateIcon);
                }
                if (task.attachments && task.attachments.length > 0) {
                    const figmaIconHTML = `<img src="figma.png" alt="Figma" width="22" height="22">`;
                    const jiraIconHTML = `<img src="jira.png" alt="Jira" width="22" height="22">`;
                    task.attachments.forEach(attachment => {
                        const attachmentLink = document.createElement('a');
                        attachmentLink.className = 'sticker-link';
                        if (attachment.url && attachment.url.includes('figma.com')) {
                            attachmentLink.innerHTML = figmaIconHTML;
                        } else if (attachment.url && attachment.url.includes('atlassian.net')) {
                            attachmentLink.innerHTML = jiraIconHTML;
                        } else {
                            attachmentLink.textContent = '📄';
                        }
                        attachmentLink.href = attachment.url || '#';
                        attachmentLink.target = '_blank';
                        attachmentLink.addEventListener('click', (e) => e.stopPropagation());
                        attachmentDisplay.appendChild(attachmentLink);
                    });
                }
                taskItem.appendChild(attachmentDisplay);

                taskItem.addEventListener('click', () => {
                    showModal(task);
                });

                taskItem.style.cursor = 'pointer';

                setTimeout(() => {
                    const titleLineHeight = parseInt(window.getComputedStyle(titleDisplay).lineHeight, 10) || 20;
                    if (titleLineHeight > 0 && latestEntryDisplay && titleDisplay.scrollHeight > 0) {
                        const titleLines = Math.round(titleDisplay.scrollHeight / titleLineHeight);
                        latestEntryDisplay.style.webkitLineClamp = titleLines > 1 ? '2' : '3';
                    }
                }, 0);

                return taskItem;
            };

            const getFilteredTasks = () => {
                let tasks = allTasks;

                // Filter by view type (Active vs Archived)
                if (showArchived) {
                    tasks = tasks.filter(t => t.status === 'Completed' || t.archived);
                } else {
                    tasks = tasks.filter(t => !t.archived);
                }

                // Filter by tag
                if (activeFilter) {
                    tasks = tasks.filter(task => {
                        return task.peopleTags.includes(activeFilter) || task.moduleTags.includes(activeFilter);
                    });
                }

                return tasks;
            };

            const render = () => {
                let filteredTasks = getFilteredTasks();

                // Sort
                if (showArchived) {
                    filteredTasks.sort((a, b) => new Date(b.completedAt || b.createdAt) - new Date(a.completedAt || a.createdAt));
                } else {
                    filteredTasks.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
                }



                // Content section
                const tasksGrid = document.getElementById('tasks-grid');

                tasksGrid.innerHTML = '';





                if (filteredTasks.length > 0) {
                    filteredTasks.forEach((task, i) => {
                        tasksGrid.appendChild(createTaskCard(task, i));
                    });
                } else {
                    if (showArchived) {
                        tasksGrid.innerHTML = `
                            <div class="empty-state" style="grid-column: 1 / -1;">
                                <div class="empty-emoji">📝</div>
                                <div>No archived or completed tasks yet.</div>
                            </div>
                        `;
                    } else {
                        tasksGrid.innerHTML = `
                            <div class="empty-state" style="grid-column: 1 / -1;">
                                <div class="empty-emoji">🎉</div>
                                <div>No active tasks — all clear!</div>
                            </div>
                        `;
                    }
                }

                // Filter bar
                renderFilterBar();
            };

            const renderFilterBar = () => {
                const filterBar = document.getElementById('filter-bar');
                const tagCounts = {};

                allTasks.filter(t => !t.archived).forEach(task => {
                    [...task.peopleTags, ...task.moduleTags].forEach(tag => {
                        tagCounts[tag] = (tagCounts[tag] || 0) + 1;
                    });
                });

                const sortedTags = Object.keys(tagCounts).sort((a, b) => tagCounts[b] - tagCounts[a]);
                filterBar.innerHTML = '';

                if (sortedTags.length === 0 && allTasks.length === 0) return;






                sortedTags.forEach(tag => {
                    const chip = document.createElement('div');
                    chip.className = `filter-chip ${activeFilter === tag ? 'active' : ''}`;
                    chip.textContent = tag;
                    chip.addEventListener('click', () => {
                        activeFilter = activeFilter === tag ? null : tag;
                        render();
                    });
                    filterBar.appendChild(chip);
                });

                // "Completed" chip (rightmost)
                const completedChip = document.createElement('div');
                completedChip.className = 'filter-chip filter-chip--archive';
                completedChip.innerHTML = '📦 Completed';
                completedChip.addEventListener('click', showArchiveView);
                filterBar.appendChild(completedChip);

                // Clone chips into mobile bottom bar
                const mobileBar = document.getElementById('filter-bar-mobile');
                if (mobileBar) {
                    mobileBar.innerHTML = '';
                    filterBar.childNodes.forEach(chip => {
                        const clone = chip.cloneNode(true);
                        // Re-attach event listeners since cloneNode doesn't copy them
                        const originalTag = chip.textContent;
                        if (originalTag.includes('Completed')) {
                            clone.addEventListener('click', showArchiveView);
                        } else {
                            clone.addEventListener('click', () => {
                                activeFilter = activeFilter === originalTag ? null : originalTag;
                                render();
                            });
                        }
                        mobileBar.appendChild(clone);
                    });
                }
            };


            // --- ARCHIVE (COMPLETED) VIEW LOGIC ---
            const showArchiveView = () => {
                const archiveView = document.getElementById('archive-view');
                const archiveContent = document.getElementById('archive-content');

                // Set URL state
                history.pushState({ view: 'archive' }, '', '#completed');

                // Render completed items grouped by month
                archiveContent.innerHTML = '';

                // Only show archived tasks in the completed overlay
                const completedTasks = allTasks.filter(t => t.archived);

                // Sort by completion date descending
                completedTasks.sort((a, b) => {
                    const dateA = a.completedAt ? new Date(a.completedAt) : new Date(a.createdAt);
                    const dateB = b.completedAt ? new Date(b.completedAt) : new Date(b.createdAt);
                    return dateB - dateA;
                });

                if (completedTasks.length === 0) {
                    archiveContent.innerHTML = `
                        <div class="empty-state" style="margin-top: 50px;">
                            <div class="empty-emoji">📝</div>
                            <div>No completed tasks yet.</div>
                        </div>`;
                } else {
                    // Group by month
                    const groupedByMonth = {};
                    completedTasks.forEach(task => {
                        const date = task.completedAt ? new Date(task.completedAt) : new Date(task.createdAt);
                        const monthYear = date.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
                        if (!groupedByMonth[monthYear]) groupedByMonth[monthYear] = [];
                        groupedByMonth[monthYear].push(task);
                    });

                    for (const [monthYear, monthTasks] of Object.entries(groupedByMonth)) {
                        let overallIndex = 0;
                        const monthGroup = document.createElement('div');
                        monthGroup.className = 'archive-month-group';

                        const monthHeader = document.createElement('div');
                        monthHeader.className = 'archive-month-header';
                        monthHeader.textContent = monthYear;
                        monthGroup.appendChild(monthHeader);

                        const monthGrid = document.createElement('div');
                        monthGrid.className = 'archive-month-grid';

                        monthTasks.forEach((task, index) => {
                            const taskItem = createTaskCard(task, overallIndex++);
                            taskItem.classList.add('completed', 'is-archived'); // make look completed
                            monthGrid.appendChild(taskItem);
                        });

                        monthGroup.appendChild(monthGrid);
                        archiveContent.appendChild(monthGroup);
                    }
                }

                // Add close listener
                document.getElementById('close-archive-btn').addEventListener('click', hideArchiveView);

                requestAnimationFrame(() => {
                    archiveView.classList.add('show');
                });
            };

            const hideArchiveView = () => {
                const archiveView = document.getElementById('archive-view');
                if (!archiveView) return;
                archiveView.classList.remove('show');
                if (window.location.hash === '#completed') {
                    history.back();
                }
            };


            // Handle popstate for back button
            window.addEventListener('popstate', (event) => {
                const archiveView = document.getElementById('archive-view');
                if (archiveView && archiveView.classList.contains('show') && window.location.hash !== '#completed') {
                    archiveView.classList.remove('show');
                }
            });

            // --- INIT ---
            const init = () => {
                document.getElementById('refresh-btn').addEventListener('click', () => {
                    const btn = document.getElementById('refresh-btn');
                    btn.classList.add('spinning');
                    fetchData().finally(() => {
                        setTimeout(() => btn.classList.remove('spinning'), 800);
                    });
                });

                fetchData();
            };

            document.addEventListener('DOMContentLoaded', init);
        })();
    </script>
</body>

</html>
